<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="미팅리포터">
<meta name="theme-color" content="#E24B4A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>미팅 AI 리포터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f7;color:#1d1d1f;overscroll-behavior:none}

.header{background:#fff;border-bottom:.5px solid rgba(0,0,0,.12);padding:14px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:17px;font-weight:600}
.header-sub{font-size:11px;color:#888;margin-top:2px}
.settings-btn{width:32px;height:32px;border-radius:50%;background:#f0f0f0;border:none;cursor:pointer;font-size:16px}

.scroll-area{padding:16px 16px 48px}

@media(min-width:768px){
  body{background:#eee}
  .header{padding:14px 32px}
  .scroll-area{padding:24px 32px 48px;max-width:1100px;margin:0 auto}
  .pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
}

.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:14px}

.seg-control{display:flex;background:#f0f0f0;border-radius:10px;padding:3px}
.seg-btn{flex:1;padding:7px 4px;border:none;background:transparent;font-size:13px;border-radius:8px;cursor:pointer;color:#555;font-weight:400}
.seg-btn.active{background:#fff;color:#1d1d1f;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.12)}

.recorder-center{text-align:center;padding:10px 0}
.record-btn{width:88px;height:88px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;cursor:pointer;transition:transform .1s}
.record-btn:active{transform:scale(.94)}
.record-btn.idle{background:#E24B4A}
.record-btn.recording{background:#E24B4A;animation:pulse 1.2s infinite}
.record-btn.processing{background:#e0e0e0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,.4)}50%{box-shadow:0 0 0 14px rgba(226,75,74,0)}}
.timer{font-size:32px;font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:2px;margin-bottom:6px}
.rec-status{font-size:14px;color:#888;min-height:22px}
.live-transcript{background:#f5f5f7;border-radius:10px;padding:12px;margin-top:14px;font-size:13px;line-height:1.6;color:#555;min-height:60px;max-height:120px;overflow-y:auto;text-align:left;display:none}

.btn-primary{width:100%;padding:14px;background:#E24B4A;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{background:#ccc}
.btn-secondary{width:100%;padding:13px;background:#f0f0f0;color:#1d1d1f;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary:active{background:#e0e0e0}

.transcript-box{background:#f5f5f7;border-radius:10px;padding:14px;font-size:13px;line-height:1.8;color:#333;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-bottom:12px}
.report-text{font-size:14px;line-height:1.75;color:#1d1d1f;white-space:pre-wrap;word-break:keep-all}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0 12px}
.divider-line{flex:1;height:.5px;background:#e0e0e0}
.divider-text{font-size:11px;color:#aaa}

.attach-btn{flex:1;padding:12px 8px;background:#f5f5f7;color:#555;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.attach-btn.selected{background:#e8f4ff;color:#007AFF;border-color:#007AFF;font-weight:600}
.attach-check{font-size:16px}
.btn-row{display:flex;gap:8px;margin-top:14px}

.field-label{font-size:13px;color:#555;margin-bottom:6px;margin-top:12px}
.field-label:first-child{margin-top:0}
.text-input{width:100%;padding:12px 14px;background:#f5f5f7;border:1px solid transparent;border-radius:10px;font-size:15px;color:#1d1d1f;outline:none;-webkit-appearance:none}
.text-input:focus{border-color:#E24B4A;background:#fff}
.email-saved-badge{font-size:11px;color:#34C759;margin-left:6px}
.btn-send{width:100%;padding:14px;background:#007AFF;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-send:active{opacity:.85}

.audio-saved{display:none;align-items:center;gap:6px;background:#e8f5e9;color:#2e7d32;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.onedrive-badge{display:none;align-items:center;gap:6px;font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:10px}

.chat-msg{margin-bottom:10px}
.chat-msg-user{display:flex;justify-content:flex-end}
.chat-msg-user .bubble{background:#E24B4A;color:#fff;padding:10px 14px;border-radius:16px 16px 4px 16px;font-size:14px;line-height:1.5;max-width:85%;white-space:pre-wrap;word-break:keep-all}
.chat-msg-ai .bubble{background:#f0f0f0;color:#1d1d1f;padding:10px 14px;border-radius:16px 16px 16px 4px;font-size:14px;line-height:1.5;max-width:92%;white-space:pre-wrap;word-break:keep-all}
.chat-typing{display:flex;gap:4px;padding:12px 14px;background:#f0f0f0;border-radius:16px 16px 16px 4px;width:fit-content}
.chat-typing span{width:7px;height:7px;background:#aaa;border-radius:50%;animation:typing 1s infinite}
.chat-typing span:nth-child(2){animation-delay:.15s}
.chat-typing span:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.quick-btn{padding:6px 12px;background:#f0f0f0;border:none;border-radius:20px;font-size:12px;color:#555;cursor:pointer;white-space:nowrap}
.quick-btn:active{background:#e0e0e0}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:50}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%}
.modal h2{font-size:18px;font-weight:600;margin-bottom:6px}
.modal p{font-size:14px;color:#555;line-height:1.6;margin-bottom:16px}
.error-msg{font-size:13px;color:#E24B4A;margin-top:8px;text-align:center}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🎙 미팅 AI 리포터</div>
    <div class="header-sub">영어 녹음 → AI 요약 + 한국어 보고서</div>
  </div>
  <button class="settings-btn" onclick="openSettings()">⚙️</button>
</div>

<div class="scroll-area">
<div class="pc-grid">

  <!-- 왼쪽: 설정 + 녹음 -->
  <div>
    <div class="card">
      <div class="card-label">보고서 언어</div>
      <div class="seg-control">
        <button class="seg-btn active" onclick="setMode('ko',this)">한국어</button>
        <button class="seg-btn" onclick="setMode('en',this)">English</button>
        <button class="seg-btn" onclick="setMode('both',this)">둘 다</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">녹음 언어</div>
      <div class="seg-control">
        <button class="seg-btn" onclick="setRecLang('en-US',this)">🇺🇸 영어</button>
        <button class="seg-btn active" onclick="setRecLang('mixed',this)">🌐 혼용</button>
        <button class="seg-btn" onclick="setRecLang('ko-KR',this)">🇰🇷 한국어</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">녹음</div>
      <div class="recorder-center">
        <button class="record-btn idle" id="recordBtn" onclick="toggleRecord()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="7"/></svg>
        </button>
        <div class="timer" id="timer">00:00</div>
        <div class="rec-status" id="recStatus">버튼을 눌러 녹음 시작</div>
        <div class="live-transcript" id="liveTranscript"></div>
        <div id="langToggleRow" class="hidden" style="margin-top:10px;text-align:center">
          <button onclick="toggleRecLang()" style="padding:6px 16px;border-radius:20px;border:1px solid #ddd;background:#f5f5f7;font-size:13px;color:#555;cursor:pointer">🔄 언어 전환</button>
          <div id="currentLangLabel" style="font-size:11px;color:#aaa;margin-top:4px"></div>
        </div>
      </div>
      <button class="btn-primary hidden" id="stopBtn" onclick="stopRecording()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><rect x="3" y="3" width="10" height="10" rx="2"/></svg>
        중지 및 분석
      </button>
    </div>
  </div>

  <!-- 오른쪽: 결과 + 이메일 + 채팅 -->
  <div>
    <div class="card hidden" id="resultCard">
      <div class="card-label">녹음 자막 (전체)</div>
      <div class="transcript-box" id="transcriptFull"></div>
      <div class="divider"><div class="divider-line"></div><div class="divider-text">AI 보고서</div><div class="divider-line"></div></div>
      <div class="report-text" id="reportText"></div>
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-top:16px;margin-bottom:10px">이메일 첨부 선택</div>
      <div class="btn-row">
        <button class="attach-btn" id="attachReport" onclick="toggleAttach('report')"><span class="attach-check" id="checkReport">○</span> 보고서 첨부</button>
        <button class="attach-btn" id="attachTranscript" onclick="toggleAttach('transcript')"><span class="attach-check" id="checkTranscript">○</span> 자막 첨부</button>
      </div>
    </div>

    <div class="card hidden" id="emailCard">
      <div class="card-label">이메일로 공유</div>
      <div class="audio-saved" id="audioSavedBadge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span id="audioSavedText">음성 파일 저장됨</span>
      </div>
      <div class="onedrive-badge" id="onedriveBadge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
        <span id="onedriveText">OneDrive 업로드 중...</span>
      </div>
      <div class="field-label">받는 사람 <span class="email-saved-badge hidden" id="emailSavedBadge">✓ 저장됨</span></div>
      <input type="email" class="text-input" id="emailTo" placeholder="colleague@promega.com" oninput="onEmailInput()">
      <div class="field-label">참조 (CC, 선택)</div>
      <input type="email" class="text-input" id="emailCc" placeholder="team@promega.com">
      <div class="field-label">제목</div>
      <input type="text" class="text-input" id="emailSubject">
      <button class="btn-send" onclick="sendEmail()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Outlook으로 보내기
      </button>
      <p style="font-size:12px;color:#aaa;margin-top:8px;text-align:center">첨부 선택 후 보내기를 눌러주세요</p>
      <div class="error-msg hidden" id="emailError"></div>
    </div>

    <div class="card" id="chatCard">
      <div class="card-label">AI에게 질문하기</div>
      <div id="chatMessages" style="min-height:60px;max-height:280px;overflow-y:auto;margin-bottom:12px"></div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <textarea id="chatInput" class="text-input" placeholder="보고서 내용에 대해 질문하거나 추가 분석을 요청하세요" style="flex:1;resize:none;height:72px;font-size:14px;line-height:1.5" onkeydown="onChatKey(event)"></textarea>
        <button onclick="sendChat()" id="chatSendBtn" style="width:44px;height:44px;background:#E24B4A;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
        <button class="quick-btn" onclick="quickAsk('액션 아이템을 표로 정리해줘')">📋 액션 아이템 표</button>
        <button class="quick-btn" onclick="quickAsk('이 보고서를 영어로 번역해줘')">🌐 영어 번역</button>
        <button class="quick-btn" onclick="quickAsk('후속 이메일 초안을 작성해줘')">✉️ 후속 이메일</button>
        <button class="quick-btn" onclick="quickAsk('핵심 결정사항만 한 줄로 요약해줘')">⚡ 한 줄 요약</button>
      </div>
    </div>
  </div>

</div>
</div>

<div class="overlay hidden" id="settingsOverlay">
  <div class="modal">
    <h2>⚙️ 설정</h2>
    <p style="font-size:14px;color:#555;line-height:1.6;margin-bottom:16px">Claude API 키를 입력하세요.<br>IT Request를 통해 발급받을 수 있습니다.</p>
    <div class="field-label">Claude API Key</div>
    <input type="password" class="text-input" id="apiKeyInput" placeholder="sk-ant-...">
    <button class="btn-primary" onclick="saveSettings()" style="margin-top:14px">저장</button>
    <button class="btn-secondary" onclick="closeSettings()">취소</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var recognition = null;
var mediaRecorder = null;
var audioChunks = [];
var audioBlob = null;
var timerInterval = null;
var seconds = 0;
var currentMode = 'ko';
var recLang = 'mixed';
var isRecording = false;
var fullTranscript = '';
var interimTranscript = '';
var currentReport = '';
var chatHistory = [];
var attachReport = false;
var attachTranscript = false;
var oneDriveUrl = null;

window.addEventListener('load', function() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  if (!localStorage.getItem('claude_api_key')) openSettings();
  loadSavedEmail();
});

// ── 설정 ──
function openSettings() {
  document.getElementById('apiKeyInput').value = localStorage.getItem('claude_api_key') || '';
  document.getElementById('settingsOverlay').classList.remove('hidden');
}
function closeSettings() { document.getElementById('settingsOverlay').classList.add('hidden'); }
function saveSettings() {
  var key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-')) { showToast('올바른 API 키를 입력하세요'); return; }
  localStorage.setItem('claude_api_key', key);
  closeSettings();
  showToast('저장되었습니다 ✓');
}

// ── 이메일 저장 ──
function loadSavedEmail() {
  var saved = localStorage.getItem('saved_email');
  if (saved) {
    document.getElementById('emailTo').value = saved;
    document.getElementById('emailSavedBadge').classList.remove('hidden');
  }
}
function onEmailInput() {
  var val = document.getElementById('emailTo').value.trim();
  if (val) { localStorage.setItem('saved_email', val); document.getElementById('emailSavedBadge').classList.remove('hidden'); }
  else { localStorage.removeItem('saved_email'); document.getElementById('emailSavedBadge').classList.add('hidden'); }
}

// ── 언어/모드 ──
function setMode(m, btn) {
  currentMode = m;
  document.querySelectorAll('.seg-control')[0].querySelectorAll('.seg-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}
function setRecLang(lang, btn) {
  recLang = lang;
  document.querySelectorAll('.seg-control')[1].querySelectorAll('.seg-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}
function toggleRecLang() {
  if (!recognition) return;
  var next = recognition.lang === 'en-US' ? 'ko-KR' : 'en-US';
  recognition.lang = next;
  recognition.stop();
  document.getElementById('currentLangLabel').textContent = next === 'en-US' ? '🇺🇸 영어 인식 중' : '🇰🇷 한국어 인식 중';
}

// ── 타이머 ──
function updateTimer() {
  seconds++;
  document.getElementById('timer').textContent =
    String(Math.floor(seconds/60)).padStart(2,'0') + ':' + String(seconds%60).padStart(2,'0');
}

// ── 녹음 시작/중지 토글 ──
async function toggleRecord() {
  if (isRecording) { stopRecording(); return; }
  if (!localStorage.getItem('claude_api_key')) { openSettings(); return; }

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Safari를 사용해주세요.'); return; }

  fullTranscript = '';
  interimTranscript = '';
  audioChunks = [];
  audioBlob = null;

  // 음성인식
  recognition = new SR();
  recognition.lang = recLang === 'en-US' ? 'en-US' : 'ko-KR';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onresult = function(e) {
    interimTranscript = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + ' ';
      else interimTranscript += e.results[i][0].transcript;
    }
    var box = document.getElementById('liveTranscript');
    box.textContent = fullTranscript + interimTranscript;
    box.scrollTop = box.scrollHeight;
  };
  recognition.onerror = function(e) {
    if (e.error === 'not-allowed') showToast('마이크 권한이 필요합니다');
    else if (e.error !== 'no-speech') showToast('음성인식 오류: ' + e.error);
  };
  recognition.onend = function() { if (isRecording) recognition.start(); };
  recognition.start();

  // 오디오 파일 녹음
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    var mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
      : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      audioBlob = new Blob(audioChunks, { type: mimeType });
      stream.getTracks().forEach(function(t){ t.stop(); });
    };
    mediaRecorder.start(1000);
  } catch(err) { /* 오디오 녹음 실패해도 음성인식 계속 */ }

  isRecording = true;
  seconds = 0;
  timerInterval = setInterval(updateTimer, 1000);

  document.getElementById('recordBtn').className = 'record-btn recording';
  document.getElementById('recStatus').textContent = recLang === 'ko-KR' ? '한국어로 말씀하세요...'
    : recLang === 'mixed' ? '영어/한국어 자유롭게 말씀하세요...' : '영어로 말씀하세요...';
  document.getElementById('liveTranscript').style.display = 'block';
  document.getElementById('stopBtn').classList.remove('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('emailCard').classList.add('hidden');

  if (recLang === 'mixed') {
    document.getElementById('langToggleRow').classList.remove('hidden');
    document.getElementById('currentLangLabel').textContent = '🇰🇷 한국어 인식 중';
  }
}

// ── 녹음 중지 ──
function stopRecording() {
  if (!recognition) return;
  isRecording = false;
  clearInterval(timerInterval);

  recognition.onresult = null;
  recognition.onerror = null;
  recognition.onend = null;
  try { recognition.abort(); } catch(e) {}
  recognition = null;

  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();

  document.getElementById('recordBtn').className = 'record-btn processing';
  document.getElementById('recStatus').textContent = 'Claude 분석 중...';
  document.getElementById('stopBtn').classList.add('hidden');
  document.getElementById('langToggleRow').classList.add('hidden');

  var transcript = (fullTranscript + interimTranscript).trim();
  if (!transcript) {
    showToast('음성이 인식되지 않았습니다. 다시 시도해주세요.');
    resetRecorder();
    return;
  }
  setTimeout(function() {
    autoSaveAudio();
    analyzeWithClaude(transcript);
  }, 400);
}

// ── 음성 파일 자동 저장 ──
function autoSaveAudio() {
  if (!audioBlob) return;
  try {
    var ext = audioBlob.type.includes('mp4') ? 'm4a' : audioBlob.type.includes('webm') ? 'webm' : 'ogg';
    var now = new Date();
    var dateStr = now.getFullYear() + '-'
      + String(now.getMonth()+1).padStart(2,'0') + '-'
      + String(now.getDate()).padStart(2,'0') + '_'
      + String(now.getHours()).padStart(2,'0')
      + String(now.getMinutes()).padStart(2,'0');
    var fileName = '미팅녹음_' + dateStr + '.' + ext;
    var url = URL.createObjectURL(audioBlob);
    var a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    showToast('🎵 음성 파일 저장: ' + fileName);
  } catch(e) { console.log('자동 저장 오류:', e); }
}

// ── Claude 분석 ──
async function analyzeWithClaude(transcript) {
  var key = localStorage.getItem('claude_api_key');
  var today = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
  var modePrompt = currentMode === 'ko' ? '결과물은 반드시 한국어로 작성하세요.'
    : currentMode === 'en' ? 'Provide output in English only.'
    : '영어 원문과 한국어 번역 둘 다 포함하세요.';
  var langNote = recLang === 'mixed' ? '전사본은 한국어와 영어가 혼용되어 있습니다.' : '';

  var prompt = '다음은 미팅의 음성인식 전사본입니다. 분석해서 구조화된 보고서를 작성해주세요.\n'
    + modePrompt + (langNote ? '\n' + langNote : '')
    + '\n\n전사본:\n' + transcript
    + '\n\n---\n보고서 형식 (마크다운 없이 순수 텍스트):\n\n'
    + '[회의 개요]\n일시: ' + today + '\n참석자: (언급된 이름 또는 확인 불가)\n\n'
    + '[핵심 요약]\n3-5문장 요약\n\n'
    + '[주요 논의 사항]\n1. ...\n2. ...\n\n'
    + '[결정 사항]\n- ...\n\n'
    + '[액션 아이템]\n- [담당자] 내용\n\n'
    + '[기타]\n없으면 없음';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    var data = await res.json();
    if (data.error) throw new Error(data.error.message);
    var tb = data.content && data.content.find(function(b){ return b.type === 'text'; });
    currentReport = tb ? tb.text : '';
    showResult(transcript, currentReport, today);
  } catch(e) {
    showToast('분석 오류: ' + e.message);
    resetRecorder();
  }
}

// ── 결과 표시 ──
function showResult(transcript, report, today) {
  resetRecorder();
  document.getElementById('liveTranscript').style.display = 'none';
  document.getElementById('transcriptFull').textContent = transcript;
  document.getElementById('reportText').textContent = report;
  document.getElementById('resultCard').classList.remove('hidden');
  document.getElementById('emailCard').classList.remove('hidden');
  document.getElementById('emailSubject').value = '[미팅 보고서] ' + today + ' 회의 요약';

  // 상태 초기화
  attachReport = false; attachTranscript = false; oneDriveUrl = null;
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  ['attachReport','attachTranscript'].forEach(function(id){ document.getElementById(id).classList.remove('selected'); });
  document.getElementById('checkReport').textContent = '○';
  document.getElementById('checkTranscript').textContent = '○';

  // 음성 파일 저장 배지
  if (audioBlob) {
    var badge = document.getElementById('audioSavedBadge');
    badge.style.display = 'flex';
    document.getElementById('audioSavedText').textContent = '음성 파일이 기기에 저장되었습니다';
  }

  loadSavedEmail();
  if (audioBlob) uploadToOneDrive();

  setTimeout(function(){ document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' }); }, 100);
}

// ── 첨부 토글 ──
function toggleAttach(type) {
  if (type === 'report') {
    attachReport = !attachReport;
    document.getElementById('attachReport').classList.toggle('selected', attachReport);
    document.getElementById('checkReport').textContent = attachReport ? '●' : '○';
  } else {
    attachTranscript = !attachTranscript;
    document.getElementById('attachTranscript').classList.toggle('selected', attachTranscript);
    document.getElementById('checkTranscript').textContent = attachTranscript ? '●' : '○';
  }
}

// ── 이메일 전송 ──
async function sendEmail() {
  var to = document.getElementById('emailTo').value.trim();
  var cc = document.getElementById('emailCc').value.trim();
  var subject = document.getElementById('emailSubject').value.trim();
  var errEl = document.getElementById('emailError');
  if (!to) { errEl.textContent = '받는 사람을 입력해주세요'; errEl.classList.remove('hidden'); return; }
  errEl.classList.add('hidden');

  var transcript = document.getElementById('transcriptFull').textContent;
  var today = new Date().toLocaleDateString('ko-KR');
  var finalSubject = subject || '[미팅 보고서] ' + today + ' 회의 요약';
  var divider = '─'.repeat(40);

  // 첨부 파일 생성
  var files = [];
  if (attachReport && currentReport) {
    files.push(new File([new Blob([currentReport], {type:'text/plain'})], '미팅보고서_' + today + '.txt', {type:'text/plain'}));
  }
  if (attachTranscript && transcript) {
    files.push(new File([new Blob([transcript], {type:'text/plain'})], '미팅자막_' + today + '.txt', {type:'text/plain'}));
  }

  // 이메일 본문 (항상 전체 내용 포함)
  var body = '안녕하세요,\n\n미팅 보고서를 공유드립니다.\n\n';
  if (oneDriveUrl) body += '🎙 음성 녹음 (OneDrive):\n' + oneDriveUrl + '\n\n';
  if (currentReport) body += divider + '\n\n[AI 미팅 보고서]\n\n' + currentReport + '\n\n';
  if (transcript) body += divider + '\n\n[전체 자막]\n\n' + transcript + '\n\n';
  body += divider + '\n본 보고서는 AI가 자동 생성한 내용입니다.\n감사합니다.';

  if (audioBlob && !oneDriveUrl) offerAudioDownload();

  // Web Share API (파일 첨부)
  if (files.length > 0 && navigator.canShare && navigator.canShare({ files: files })) {
    try {
      await navigator.share({ files: files, title: finalSubject, text: body });
      return;
    } catch(e) {
      if (e.name !== 'AbortError') {
        files.forEach(function(f) {
          var url = URL.createObjectURL(f);
          var a = document.createElement('a'); a.href = url; a.download = f.name; a.click();
          setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
        });
        showToast('파일 다운로드됨. 이메일에 직접 첨부해주세요.');
      }
    }
  } else if (files.length > 0) {
    files.forEach(function(f) {
      var url = URL.createObjectURL(f);
      var a = document.createElement('a'); a.href = url; a.download = f.name; a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    });
    showToast('파일 다운로드됨. 이메일에 직접 첨부해주세요.');
  }

  var mailtoUrl = 'mailto:' + encodeURIComponent(to)
    + (cc ? '?cc=' + encodeURIComponent(cc) + '&' : '?')
    + 'subject=' + encodeURIComponent(finalSubject)
    + '&body=' + encodeURIComponent(body);
  window.location.href = mailtoUrl;
}

// ── OneDrive 업로드 ──
async function uploadToOneDrive() {
  if (!audioBlob) return;
  var key = localStorage.getItem('claude_api_key');
  if (!key) return;
  if (audioBlob.size > 5 * 1024 * 1024) return;

  var badge = document.getElementById('onedriveBadge');
  badge.style.display = 'flex';
  badge.style.background = '#fff3e0'; badge.style.color = '#e65100';
  document.getElementById('onedriveText').textContent = 'OneDrive 업로드 중...';

  try {
    var base64 = await blobToBase64(audioBlob);
    var ext = audioBlob.type.includes('mp4') ? 'm4a' : audioBlob.type.includes('webm') ? 'webm' : 'ogg';
    var today = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
    var fileName = '미팅녹음_' + today + '.' + ext;
    var prompt = 'OneDrive의 미팅녹음 폴더에 파일을 업로드하고 공유 링크만 반환해주세요. 파일명: ' + fileName + ' / 형식: ' + audioBlob.type + ' / base64: ' + base64 + ' / 실패 시 FAILED만 반환.';
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 300,
        messages: [{ role: 'user', content: prompt }],
        mcp_servers: [{ type: 'url', url: 'https://microsoft365.mcp.claude.com/mcp', name: 'microsoft365' }]
      })
    });
    var data = await res.json();
    if (data.error) throw new Error(data.error.message);
    var tb = data.content && data.content.find(function(b){ return b.type === 'text'; });
    var result = tb ? tb.text : '';
    if (result.includes('FAILED') || !result.includes('http')) throw new Error('업로드 실패');
    var m = result.match(/https?:\/\/[^\s\n"')]+/);
    if (m) {
      oneDriveUrl = m[0];
      badge.style.background = '#e8f5e9'; badge.style.color = '#2e7d32';
      document.getElementById('onedriveText').textContent = 'OneDrive 업로드 완료 ✓';
    } else throw new Error('링크 없음');
  } catch(e) {
    badge.style.background = '#f5f5f7'; badge.style.color = '#888';
    document.getElementById('onedriveText').textContent = 'OneDrive 업로드 실패 (기기에 저장됨)';
  }
}

function offerAudioDownload() {
  if (!audioBlob) return;
  var ext = audioBlob.type.includes('mp4') ? 'm4a' : audioBlob.type.includes('webm') ? 'webm' : 'ogg';
  var url = URL.createObjectURL(audioBlob);
  var a = document.createElement('a');
  a.href = url; a.download = '미팅녹음_' + new Date().toISOString().slice(0,10) + '.' + ext; a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

// ── AI 채팅 ──
function onChatKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } }
function quickAsk(text) { document.getElementById('chatInput').value = text; sendChat(); }
function appendMsg(role, text) {
  var box = document.getElementById('chatMessages');
  var div = document.createElement('div'); div.className = 'chat-msg chat-msg-' + role;
  var b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
  div.appendChild(b); box.appendChild(div); box.scrollTop = box.scrollHeight;
}
function showTyping() {
  var box = document.getElementById('chatMessages');
  var div = document.createElement('div'); div.className = 'chat-msg chat-msg-ai'; div.id = 'typing';
  div.innerHTML = '<div class="chat-typing"><span></span><span></span><span></span></div>';
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}
function removeTyping() { var el = document.getElementById('typing'); if (el) el.remove(); }

async function sendChat() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim(); if (!text) return;
  var key = localStorage.getItem('claude_api_key'); if (!key) { openSettings(); return; }
  input.value = '';
  document.getElementById('chatSendBtn').disabled = true;
  appendMsg('user', text); showTyping();
  var context = currentReport ? '미팅 보고서:\n\n' + currentReport + '\n\n---\n\n' : '';
  chatHistory.push({ role: 'user', content: context + text });
  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1000,
        system: '당신은 미팅 보고서 분석 전문가입니다. 간결하고 실용적으로 답변하세요.',
        messages: chatHistory
      })
    });
    var data = await res.json();
    if (data.error) throw new Error(data.error.message);
    var tb = data.content && data.content.find(function(b){ return b.type === 'text'; });
    var reply = tb ? tb.text : '';
    chatHistory.push({ role: 'assistant', content: reply });
    removeTyping(); appendMsg('ai', reply);
  } catch(e) { removeTyping(); appendMsg('ai', '오류: ' + e.message); chatHistory.pop(); }
  document.getElementById('chatSendBtn').disabled = false;
}

// ── 유틸 ──
function blobToBase64(blob) {
  return new Promise(function(res, rej) {
    var r = new FileReader(); r.onload = function(){ res(r.result.split(',')[1]); }; r.onerror = rej; r.readAsDataURL(blob);
  });
}
function showToast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}
function resetRecorder() {
  document.getElementById('recordBtn').className = 'record-btn idle';
  document.getElementById('recStatus').textContent = '버튼을 눌러 녹음 시작';
  document.getElementById('timer').textContent = '00:00';
  seconds = 0; isRecording = false;
}
